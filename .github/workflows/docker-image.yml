name: Docker Image CI

on:
  push:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t my-dockerhub-lyna156/myapp:${{ github.sha }} .
          docker tag my-dockerhub-lyna156/myapp:${{ github.sha }} my-dockerhub-lyna156/myapp:latest

      - name: Push Docker image
        run: |
          docker push my-dockerhub-lyna156/myapp:${{ github.sha }}
          docker push my-dockerhub-lyna156/myapp:latest
